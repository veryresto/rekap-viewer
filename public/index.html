<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekap IPL Viewer</title>
  <meta name="description"
    content="Tabel rekap pembayaran IPL warga, diambil langsung dari Google Sheets secara otomatis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="app-header" role="banner">
    <div>
      <h1>📋 Rekap IPL</h1>
      <div class="subtitle">Data melalui server Rekap Viewer</div>
      <div id="sync-time" class="sync-time" aria-live="polite"></div>
    </div>
    <div class="header-right">
      <span class="badge" id="row-count">Memuat…</span>
      
      <div class="user-dropdown-container">
        <button id="user-menu-btn" class="user-menu-btn" aria-expanded="false" aria-haspopup="true" aria-label="User menu">
          <div class="avatar" id="user-avatar-btn">
            <span id="user-initials">U</span>
          </div>
        </button>
        
        <div id="user-dropdown" class="user-dropdown">
          <div class="user-dropdown-header">
            <div class="avatar avatar-large" id="user-avatar-large">
              <span id="user-initials-large">U</span>
            </div>
            <div class="user-info-text">
              <p class="user-name" id="user-name">User</p>
              <p class="user-email" id="user-email">Loading...</p>
            </div>
          </div>
          <div class="dropdown-separator"></div>
          <button id="sign-out-btn" class="dropdown-item text-destructive">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" x2="9" y1="12" y2="12"></line></svg>
            Sign out
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="main" role="main">

    <div id="status" class="loading" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <span>Menghubungkan ke server…</span>
    </div>

    <div class="filter-bar" id="filter-bar" role="search" aria-label="Filter berdasarkan Blok atau cari nomor">
      <div class="filter-main-row">
        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="search-input"
            type="search"
            class="search-input"
            placeholder="Cari nomor…"
            autocomplete="off"
            spellcheck="false"
            aria-label="Cari berdasarkan Nomor"
          />
          <button id="search-clear" class="search-clear" aria-label="Hapus pencarian" hidden>✕</button>
        </div>

        <button id="filter-toggle-btn" class="filter-toggle-btn" aria-expanded="false" aria-controls="filter-collapse-content">
          <span>Unit Blok</span>
          <span id="active-filter-count" class="filter-count-badge" hidden>0</span>
          <span class="toggle-arrow" aria-hidden="true">▾</span>
        </button>
      </div>

      <div id="filter-collapse-content" class="filter-content">
        <span class="filter-label">Filter Blok</span>
        <div class="chip-group" id="blok-chips"></div>
      </div>
    </div>

    <div class="table-container" id="table-container">
      <table id="rekap-table" role="grid" aria-label="Tabel Rekap IPL">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </main>

  <script src="app.js"></script>
</body>

</html>
