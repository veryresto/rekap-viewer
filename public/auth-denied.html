<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akses Ditolak - Rekap IPL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      text-align: center;
      padding: 20px;
    }
    .denied-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    h2 {
      margin-top: 0;
      color: var(--text);
    }
    p {
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="denied-card">
    <h2 id="title">Akses Ditolak</h2>
    <p id="message">Memuat informasi...</p>
    <a href="https://community.veryresto.com" class="btn">Kembali ke Portal</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    
    const titleEl = document.getElementById('title');
    const msgEl = document.getElementById('message');
    
    if (reason === 'pending') {
        titleEl.textContent = 'Menunggu Persetujuan';
        msgEl.textContent = 'Anda telah berhasil masuk, tetapi akun Anda masih menunggu persetujuan admin. Anda akan diberi tahu setelah akses diberikan.';
    } else if (reason === 'rejected') {
        titleEl.textContent = 'Akses Ditolak';
        msgEl.textContent = 'Pendaftaran akun Anda tidak disetujui. Silakan hubungi admin komunitas jika menurut Anda ini adalah kesalahan.';
    } else if (reason === 'suspended') {
        titleEl.textContent = 'Akun Ditangguhkan';
        msgEl.textContent = 'Akun Anda telah ditangguhkan. Silakan hubungi admin komunitas.';
    } else if (reason === 'unauthorized_role') {
        titleEl.textContent = 'Izin Tidak Memadai';
        msgEl.textContent = 'Akun Anda telah disetujui, tetapi Anda belum memiliki peran (role) yang diperlukan untuk mengakses Rekap IPL. Silakan hubungi admin komunitas.';
    } else {
        titleEl.textContent = 'Akses Ditolak';
        msgEl.textContent = 'Anda tidak memiliki izin untuk melihat halaman ini.';
    }
  </script>
</body>
</html>
